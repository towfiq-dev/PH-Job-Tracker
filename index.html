<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Tracker</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Your website short description here">
  <meta name="keywords" content="HTML, CSS, JavaScript, Web Design">
  <meta name="author" content="Your Name">
  <meta name="robots" content="index, follow">
  <!-- fav-icon -->
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <!-- tailwind+daisyui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- google-fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- internal-css -->
  <style>
    .geist-fonts {
  font-family: "Geist", sans-serif;
  font-optical-sizing: auto;
  font-weight: normal
  }
  </style>
</head>
<body class="geist-fonts">
  <div>
    <!-- header section -->
            <header class="mb-10">
            <h1 class="text-3xl font-bold text-[#002D5B] mb-8">Job Application Tracker</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 font-medium">Total</p>
                    <p id="total-count" class="text-4xl font-bold text-[#002D5B]">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 font-medium">Interview</p>
                    <p id="interview-count" class="text-4xl font-bold text-green-500">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 font-medium">Rejected</p>
                    <p id="rejected-count" class="text-4xl font-bold text-red-500">0</p>
                </div>
            </div>
        </header>
  </div>
  <!-- external JS -->
  <script src="./script.js"></script>
</body>
</html>
