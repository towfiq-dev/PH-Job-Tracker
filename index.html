<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Tracker</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Your website short description here">
  <meta name="keywords" content="HTML, CSS, JavaScript, Web Design">
  <meta name="author" content="Your Name">
  <meta name="robots" content="index, follow">
  <!-- fav-icon -->
  <link rel="shortcut icon" href="./asset/Towfiqul logo.png" type="image/x-icon">
  <!-- tailwind+daisyui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- google-fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- internal-css -->
  <style>
    .geist-fonts {
  font-family: "Geist", sans-serif;
  font-optical-sizing: auto;
  font-weight: normal
  }
  </style>
</head>
<body class="geist-fonts">
    <div class="container mx-auto px-4 py-8 lg:w-[80%]">
    <!-- header section -->
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-[#002D5B] mb-8">Job Application Tracker</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 font-medium">Total</p>
                    <p id="total-count" class="text-4xl font-bold text-[#002D5B]">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 font-medium">Interview</p>
                    <p id="interview-count" class="text-4xl font-bold text-green-500">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 font-medium">Rejected</p>
                    <p id="rejected-count" class="text-4xl font-bold text-red-500">0</p>
                </div>
            </div>
        </header>

        <hr class="border-gray-200 mb-10">
        <!-- main section -->
        <main>
          <!-- available jobs -->
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-[#002D5B]">Available Jobs</h2>
                <span id="tab-job-count" class="text-gray-500 font-medium">0 jobs</span>
            </div>

            <!-- available btns -->
            <div class="flex gap-4 mb-8 overflow-x-auto">
                <button id="tab-all" class="btn btn-sm bg-blue-600 text-white hover:bg-blue-700">All</button>
                <button id="tab-interview" class="btn btn-sm bg-gray-200 text-gray-700">Interview</button>
                <button id="tab-rejected" class="btn btn-sm bg-gray-200 text-gray-700">Rejected</button>
            </div>

            <!-- no job available div -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 bg-white rounded-2xl border border-gray-100 shadow-sm">
                <img src="./asset/jobs.png" alt="No jobs" class="w-24 mb-4 opacity-50">
                <h3 class="text-xl font-bold text-gray-800">No jobs available</h3>
                <p class="text-gray-500">Check back soon for new job opportunities</p>
            </div>
        </main>
    </div>

  <!-- external JS -->
  <script src="./script.js"></script>
</body>
</html>
